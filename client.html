<!DOCTYPE html>
<html>

<head>
    <title>Demo Client</title>
</head>

<body>
    <pre>
      __|__
*---o--(_)--o---*
</pre>
   <h1>WebSocket Client Test</h1>
    <h3><a href="https://www.diyflightsimpanels.com" target="_blank">www.diyflightsimpanels.com</a></h3>
    <hr/>
    <div id="messages"></div>

    <script>
        const socket = new WebSocket('ws://192.168.68.123:3000'); // Update with your server's IP address and port
        const messagesDiv = document.getElementById('messages');
        const statusElement = document.createElement('h2');
        messagesDiv.appendChild(statusElement);

        socket.addEventListener('open', () => {
            statusElement.textContent = 'Connected to server';
        });

        socket.addEventListener('message', (event) => {
            const altitude = event.data;
            statusElement.textContent = `Received altitude: ${altitude} feet`;
        });

        socket.addEventListener('close', () => {
            statusElement.textContent = 'Disconnected from server';
        });
    </script>
</body>

</html>
